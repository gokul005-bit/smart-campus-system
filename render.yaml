services:
  - type: web
    name: smartcampus-backend
    env: node
    buildCommand: rm -rf node_modules && PRISMA_CLI_BINARY_TARGETS=debian-openssl-3.0.x npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        sync: false
